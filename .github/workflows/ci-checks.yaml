name: Android CI Checks

on:
  pull_request:
  push:
jobs:
  checks:
    name: Run CI Checks
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup JDK
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Gradle (faster CI)
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/*.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make gradlew executable
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      # 5. Run Lint checks (Android lint)
      - name: Android Lint
        run: ./gradlew lint

      # 6. Run Unit Tests
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # 7. Build Debug APK to verify build integrity
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 8. Optional: Verify Gradle dependencies
      - name: Gradle Dependency Check
        run: ./gradlew dependencyCheckAnalyze || true

