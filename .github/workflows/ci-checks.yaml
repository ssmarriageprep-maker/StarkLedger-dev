name: Android CI Checks
# Runs only on pull requests so feature-branch pushes don't burn CI minutes.
# The build/release on main is handled by android-build.yaml.
# on:
#   pull_request:
jobs:
  checks:
    name: Run CI Checks
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4
      # 2. Setup JDK
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      # 3. Cache Gradle (faster CI)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/*.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      # 4. Make gradlew executable
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew
      # 5. Run Lint checks (Android lint)
      - name: Android Lint
        run: ./gradlew lint
      # 6. Run Unit Tests
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest
      # 7. Build Debug APK to verify build integrity
      - name: Build Debug APK
        run: ./gradlew assembleDebug
