name: Gradle Wrapper Validation and Fix

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-fix-wrapper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Check if Gradle wrapper exists
        id: check_wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "wrapper_missing=true" >> $GITHUB_OUTPUT
            echo "⚠️ Gradle wrapper (gradlew) is missing!"
          else
            echo "wrapper_missing=false" >> $GITHUB_OUTPUT
            echo "✅ Gradle wrapper exists"
          fi
      
      - name: Install Gradle (if wrapper is missing)
        if: steps.check_wrapper.outputs.wrapper_missing == 'true'
        run: |
          wget https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle-8.9-bin.zip
          sudo mv gradle-8.9 /opt/gradle
          export PATH=/opt/gradle/bin:$PATH
          gradle --version
      
      - name: Generate Gradle wrapper
        if: steps.check_wrapper.outputs.wrapper_missing == 'true'
        run: |
          export PATH=/opt/gradle/bin:$PATH
          gradle wrapper --gradle-version 8.9
          chmod +x ./gradlew
          echo "✅ Gradle wrapper generated successfully"
      
      - name: Clean up temporary files
        if: steps.check_wrapper.outputs.wrapper_missing == 'true'
        run: |
          rm -f gradle-8.9-bin.zip
          sudo rm -rf /opt/gradle
          echo "✅ Cleaned up temporary Gradle installation files"
      
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2
      
      - name: Create Pull Request with wrapper files
        if: steps.check_wrapper.outputs.wrapper_missing == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: Add missing Gradle wrapper files"
          title: "🔧 Add missing Gradle wrapper files"
          body: |
            ## 🤖 Automated Fix
            
            This PR was automatically created by the Gradle Wrapper Validation workflow.
            
            ### Changes:
            - ✅ Added `gradlew` (Unix/Mac executable)
            - ✅ Added `gradlew.bat` (Windows executable)
            - ✅ Added `gradle/wrapper/gradle-wrapper.jar`
            - ✅ Added `gradle/wrapper/gradle-wrapper.properties`
            
            ### Details:
            - Gradle version: 8.9
            - Wrapper validated: ✅
            
            The Gradle wrapper was missing from the repository, which prevents the project from being built without a local Gradle installation. This PR adds the wrapper files to ensure consistent builds across all environments.
          branch: fix/add-gradle-wrapper
          delete-branch: true
          labels: |
            automated
            build
            dependencies
      
      - name: Test Gradle wrapper
        run: |
          chmod +x ./gradlew
          ./gradlew --version
          echo "✅ Gradle wrapper is working correctly"
