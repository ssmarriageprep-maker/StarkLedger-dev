name: Build Lambda Layer (Python 3.12 + Latest TTS deps)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/build_lambda_layer.yml"

jobs:
  build-layer:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2) Prepare directory
      - name: Prepare layer directory
        run: |
          rm -rf layer-build
          mkdir -p layer-build/python

      # 3) Build dependencies inside Lambda-compatible Docker
      - name: Install dependencies to layer
        run: |
          docker run --rm \
            -v "$PWD/layer-build":/var/task \
            -w /var/task \
            public.ecr.aws/sam/build-python3.12 \
            bash -lc '
              python3 -m pip install --upgrade pip &&
              pip install \
                requests \
                google-cloud-texttospeech \
                gTTS \
                urllib3<2.0 \
                feedparser==6.0.11 \
                beautifulsoup4==4.12.3 \
                edge-tts==6.1.9 \
                elevenlabs==1.10.0 \
                python-dotenv==1.0.1 \
                Pillow==10.2.0 \
                google-api-python-client==2.92.0 \
                google-auth<2.24 \
                google-auth-oauthlib==1.1.0 \
                google-auth-httplib2==0.1.1 \
                -t python/
            '

      # 4) Clean up unnecessary files to reduce size
      - name: Cleanup layer
        run: |
          cd layer-build/python
          find . -type d -name "__pycache__" -exec rm -rf {} +
          rm -rf bs4/tests PIL/tests
          cd ../..

      # 5) Zip the layer
      - name: Zip layer directory
        run: |
          cd layer-build
          zip -r9 ../lambda-layer-python312.zip python
          cd ..

      # 6) Upload the zip as artifact for inspection / download
      - name: Upload as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-layer-python312
          path: lambda-layer-python312.zip
          retention-days: 7
