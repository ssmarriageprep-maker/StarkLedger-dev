name: Build Lambda Layer (Python 3.12)

on:
  workflow_dispatch:

jobs:
  build-layer:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Build dependency layer using Lambda container
      # ----------------------------------------------------------------
      - name: Build Lambda dependencies via Docker
        run: |
          set -e

          rm -rf build_layer output
          mkdir -p build_layer output

          cat > build_layer/Dockerfile << 'EOF'
          FROM public.ecr.aws/lambda/python:3.12
          
          RUN yum install -y gcc python3-devel
          
          RUN pip install \
              --target "${LAMBDA_TASK_ROOT}" \
              --platform manylinux2014_x86_64 \
              --only-binary=:all: \
              --implementation cp \
              --python-version 312 \
              feedparser==6.0.11 \
              beautifulsoup4==4.12.3 \
              requests==2.31.0 \
              google-api-python-client==2.92.0 \
              google-auth==2.23.0 \
              google-auth-oauthlib==1.1.0 \
              gtts==2.3.2 \
              edge-tts==6.1.9 \
              elevenlabs==1.10.0 \
              Pillow==10.2.0 \
              python-dotenv==1.0.1
          
          RUN find "${LAMBDA_TASK_ROOT}" -type d -name "*.dist-info" -exec rm -rf {} + \
           && find "${LAMBDA_TASK_ROOT}" -type d -name "__pycache__" -exec rm -rf {} + \
           && find "${LAMBDA_TASK_ROOT}" -type d -name "tests" -exec rm -rf {} + \
           && find "${LAMBDA_TASK_ROOT}" -name "*.pyc" -delete
          
          RUN mkdir -p /output/python/lib/python3.12/site-packages \
           && cp -r "${LAMBDA_TASK_ROOT}"/* /output/python/lib/python3.12/site-packages/
          
          CMD ["cp","-r","/output/.","/lambda_layer/"]
          EOF

          cd build_layer

          docker build -t lambda-layer-builder .
          docker run --rm -v "$PWD/../output":/lambda_layer lambda-layer-builder

      # ----------------------------------------------------------------
      # Zip layer
      # ----------------------------------------------------------------
      - name: Zip dependency layer
        run: |
          set -e

          cd output
          zip -r9 ../dependencies-layer.zip python/

          echo "========== Layer size =========="
          du -sh .

          echo "========== Zip size =========="
          ls -lh ../dependencies-layer.zip

          echo "========== Sample contents =========="
          unzip -l ../dependencies-layer.zip | head -40

      # ----------------------------------------------------------------
      # Upload GitHub artifact
      # ----------------------------------------------------------------
      - name: Upload Layer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependencies-layer
          path: dependencies-layer.zip
          retention-days: 7
          compression-level: 9
