name: Android Build CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:

      # 1) Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2) Set up Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3) Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/*.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4) Make Gradle wrapper executable
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      # 5) Generate Release Keystore
      - name: Generate Release Keystore
        run: |
          keytool -genkey -v \
            -keystore app/release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password123 \
            -keypass password123 \
            -dname "CN=StarkLedger, OU=StarkLabs, O=StarkLabs, L=Unknown, S=Unknown, C=US"

      # 6) Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6) Build Release APK (Signed with Debug Key)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 7) Upload Debug APK as Artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # 8) Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
