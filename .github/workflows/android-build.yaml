name: Android Build CI

# Builds + publishes a GitHub Release only when changes land on main/master.
# Pull-request verification is handled by ci-checks.yaml to avoid duplicate runs.
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # 1) Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2) Set up Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3) Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/*.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4) Make Gradle wrapper executable
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      # 5) Generate Release Keystore
      - name: Generate Release Keystore
        run: |
          keytool -genkey -v \
            -keystore app/release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password123 \
            -keypass password123 \
            -dname "CN=StarkLedger, OU=StarkLabs, O=StarkLabs, L=Unknown, S=Unknown, C=US"

      # 6) Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6) Build Release APK (Signed with the generated keystore above)
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: password123
          RELEASE_KEY_ALIAS: release
          RELEASE_KEY_PASSWORD: password123

      # 7) Create GitHub Release and Upload APKs
      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
